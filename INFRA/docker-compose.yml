version: '3.8'

services:
  dashboard:
    # On remonte d'un niveau pour trouver le Dockerfile et le code
    build: 
      context: ..
      dockerfile: INFRA/Dockerfile # Si tu déplaces le Dockerfile dans INFRA
    ports:
      - "80:8501"
    volumes:
      - ..:/app # On monte tout le projet pour que Python voit DATA et DEV
    restart: always

  database:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: parkshare_password
    volumes:
      - ./postgres_data:/var/lib/postgresql/data